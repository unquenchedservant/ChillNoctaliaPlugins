id = "unquenchedservant/dhvtimer"
name = "DHV Timer"
version = "2.0.5"
min_noctalia = "5.0.0"
author = "chillhumanoid"
icon = "timer"
tags = ["timer", "productivity"]
description = "A bar widget that connects to a ChillClock timer server."

[[widget]]
id = "timer"
entry = "chillclock.luau"

  [[widget.setting]]
  key = "default_timer"
  type = "int"
  label = "Default timer"
  description = "Which ChillClock timer (1 or 2) left-click toggles; right-click toggles the other."
  default = 1
  min = 1
  max = 2
